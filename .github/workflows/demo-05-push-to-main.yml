name: Demo 05 - Push To Main

on:
  workflow_dispatch:
  push:
    branches: 
      - main
  
jobs:
  build-app:
    name: "Build App"
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x   # ✅ Updated

    - name: Install dependencies
      run: dotnet restore "${{ github.workspace }}/mywebapp/mywebapp.sln"
    
    - name: Build
      run: dotnet build "${{ github.workspace }}/mywebapp/mywebapp.sln" --configuration Release --no-restore
    
    - name: Test
      run: |
        dotnet test "${{ github.workspace }}/mywebapp/mywebapp.sln" \
        --no-restore \
        --verbosity normal \
        --logger "trx;LogFileName=test-results.trx"

    - name: Test Report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: XUnit Tests
        path: ${{ github.workspace }}/mywebapp/tests/TestResults/*.trx
        reporter: dotnet-trx
      
    - name: Publish
      run: |
        dotnet publish "${{ github.workspace }}/mywebapp/src/mywebapp.csproj" -c Release -o mywebapp
    
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4   # ✅ FIXED
      with:
        name: mywebappbuildartifacts
        path: mywebapp/**
        if-no-files-found: error
        retention-days: 90


  deploy-DEV:
    name: "Deploy To Azure DEV env"
    runs-on: ubuntu-latest
    needs: build-app
    
    environment:
      name: 'DEMO05_DEV'
      url: 'https://mywebapp-actions-dev.azurewebsites.net'

    steps:
    - uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Login to Azure
      uses: azure/login@v2   # ✅ updated
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Download Build Artifact
      uses: actions/download-artifact@v4   # ✅ FIXED
      with:
        name: mywebappbuildartifacts
        path: mywebappbuildartifacts
   
    - name: Deploy to Azure Web App (DEV)
      uses: azure/webapps-deploy@v3   # ✅ updated
      with: 
        app-name: mywebapp-actions
        package: mywebappbuildartifacts
        slot-name: dev


  deploy-QA:
    name: "Deploy To Azure QA env"
    runs-on: ubuntu-latest
    needs: build-app
    
    environment:
      name: 'DEMO05_QA'
      url: 'https://mywebapp-actions-qa.azurewebsites.net'

    steps:
    - uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Download Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: mywebappbuildartifacts
        path: mywebappbuildartifacts
   
    - name: Deploy to Azure Web App (QA)
      uses: azure/webapps-deploy@v3
      with: 
        app-name: mywebapp-actions
        package: mywebappbuildartifacts
        slot-name: qa


  deploy-PROD:
    name: "Deploy To Azure PROD env"
    runs-on: ubuntu-latest
    needs: [deploy-DEV, deploy-QA]
    
    environment:
      name: 'DEMO05_PROD'
      url: 'https://mywebapp-actions.azurewebsites.net'

    steps:
    - uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Download Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: mywebappbuildartifacts
        path: mywebappbuildartifacts
   
    - name: Deploy to Azure Web App (PROD)
      uses: azure/webapps-deploy@v3
      with: 
        app-name: mywebapp-actions
        package: mywebappbuildartifacts
